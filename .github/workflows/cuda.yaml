name: Build and Push CUDA Docker Image

on:
  workflow_dispatch: # Allow manual triggering
  workflow_call: # Allow being called from cuda-base.yaml
    inputs:
      push:
        description: 'Whether to push the image'
        type: boolean
        default: false
      anvl_ref:
        description: 'Git ref for r-xla/anvl to install'
        type: string
        default: ''
      tag:
        description: 'Image tag (e.g., latest, release)'
        type: string
        default: 'latest'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push Docker image
        uses: ./.github/actions/docker-build
        with:
          image_name: sebffischer/anvl-cuda
          dockerfile: ./cuda/Dockerfile
          push: ${{ inputs.push || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
          github_pat: ${{ secrets.GITHUB_TOKEN }}
          anvl_ref: ${{ inputs.anvl_ref }}
          extra_tags: |
            docker.io/sebffischer/anvl-cuda:${{ inputs.tag || 'latest' }}
            ghcr.io/${{ github.repository_owner }}/anvl-cuda:${{ inputs.tag || 'latest' }}
